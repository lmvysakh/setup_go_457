name: Checking with cache false for repeated invocations

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: [ubuntu-latest,macos-latest,windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true


      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false