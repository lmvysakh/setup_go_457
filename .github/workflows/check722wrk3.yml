name: "Workaround 3: Clean stale cache before restore"

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, self-hosted]
    steps:
      - uses: actions/checkout@v6

      # Remove read-only Go cache files left from previous runs
      - name: Clean Go cache directories(Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod -R u+w ~/go/pkg/mod 2>/dev/null || true
          rm -rf ~/go/pkg/mod
          chmod -R u+w ~/.cache/go-build 2>/dev/null || true
          rm -rf ~/.cache/go-build
        shell: bash

      - name: Clean Go cache directories(Windows)
        if: runner.os == 'Windows'
        run: |
          $modPath = Join-Path $env:USERPROFILE "go\pkg\mod"
          $buildPath = Join-Path $env:LOCALAPPDATA "go-build"
          if (Test-Path $modPath) {
            icacls $modPath /grant "${env:USERNAME}:(OI)(CI)F" /T /Q 2>$null
            Remove-Item -Recurse -Force $modPath
          }
          if (Test-Path $buildPath) {
            icacls $buildPath /grant "${env:USERNAME}:(OI)(CI)F" /T /Q 2>$null
            Remove-Item -Recurse -Force $buildPath
          }
        shell: powershell

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - run: go mod download

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false