name: Basic Setup Go

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  basic-setup:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      # - uses: actions/setup-go@v6
      - uses: lmvysakh/setup-go@722fix
        with:
          go-version: '1.23'
      - run: go version
      - run: go run ./main.go
        continue-on-error: true 