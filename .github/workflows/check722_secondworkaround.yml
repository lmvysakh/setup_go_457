name: Reproduce error 722 - With alternative workaround

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Sync dependencies and download modules
        run: |
          go mod tidy
          go mod download

      - name: Fix read-only permissions on cached Go directories
        run: |
          chmod -R 0755 \
            ~/go/pkg/mod \
            ~/.cache/go-build \
            ~/.cache/golangci-lint \
            ~/.cache/buf/ \
            2>/dev/null || true

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod