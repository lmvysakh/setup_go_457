name: "Workaround 2: tar --skip-old-files"

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, self-hosted]
    steps:
      - uses: actions/checkout@v6

      # Tell @actions/cache's internal tar to skip files that already exist
      # This prevents "File exists" and "Permission denied" errors
      - name: Configure tar to skip existing files (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          echo "CACHE_RESTORE_TAR_ARGS=--skip-old-files" >> "$GITHUB_ENV"
        shell: bash

      - name: Configure tar to skip existing files (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "CACHE_RESTORE_TAR_ARGS=--skip-old-files" >> "$GITHUB_ENV"
        shell: powershell

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - run: go mod download

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
