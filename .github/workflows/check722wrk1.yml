name: "Workaround 1: Skip restore if already done using env var"

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest,self-hosted]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        if: env.GO_CACHE_RESTORED != 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: Mark cache as restored (Linux/macOS)
        if: runner.os != 'Windows'
        run: echo "GO_CACHE_RESTORED=true" >> "$GITHUB_ENV"
        shell: bash

      - name: Mark cache as restored (Windows)
        if: runner.os == 'Windows'
        run: echo "GO_CACHE_RESTORED=true" >> $env:GITHUB_ENV
        shell: powershell

      - run: go mod download

      # Second invocation — env var is set, so setup-go with cache is skipped
      # Only installs/finds Go, no cache activity
      - uses: actions/setup-go@v6
        if: env.GO_CACHE_RESTORED != 'true'
        with:
          go-version-file: go.mod
          cache: true

      # This always runs to ensure Go is on PATH
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

     